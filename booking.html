<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Booking | Planet Tours</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="container">
            <a href="index.html" class="logo">Planet <span>Tours</span></a>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="text-center" style="margin-bottom: 40px;">
                <h1>Complete Your Booking</h1>
                <p>Please fill in your details to finalize your reservation.</p>
            </div>

            <form id="booking-form" class="booking-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required placeholder="09XXXXXXXX">
                </div>
                <div class="form-group">
                    <label>Service Type</label>
                    <select name="type" id="booking-type">
                        <option value="tour">Tour Package</option>
                        <option value="hotel">Hotel Stay</option>
                        <option value="flight">Flight Ticket</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>
                <div class="form-group">
                    <label>Number of Travelers</label>
                    <input type="number" name="travelers" value="1" min="1">
                </div>
                
                <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 15px;">
                    <div style="display: flex; gap: 20px;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">Pay & Confirm</button>
                    </div>
                    <button type="button" id="whatsapp-booking" class="btn" style="background: #25d366; color: white; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <i class="fab fa-whatsapp"></i> Book via WhatsApp
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { bookViaWhatsApp } from './js/app.js';
        
        // Helper to pre-select type from URL
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        if (type) {
            document.querySelector('#booking-type').value = type;
        }

        // WhatsApp Booking Event
        document.querySelector('#whatsapp-booking').addEventListener('click', () => {
            const form = document.querySelector('#booking-form');
            const name = form.querySelector('[name="name"]').value || 'Guest';
            const service = document.querySelector('#booking-type').value;
            const date = form.querySelector('[name="date"]').value;
            const travelers = form.querySelector('[name="travelers"]').value;
            
            const details = `Name: ${name}, Date: ${date}, Travelers: ${travelers}`;
            bookViaWhatsApp(service, details);
        });
    </script>
</body>
</html>
